<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6, maximum-scale=1.0, user-scalable=yes">
    <title>YouTube Channel Manager</title>
    <meta name="description" content="複数のYouTubeチャンネルを一元管理するプレミアムなダッシュボード。">
    <link rel="stylesheet" href="style.css?v=2">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i data-lucide="video" class="logo-icon"></i>
                <span>YT Manager</span>
            </div>
            <nav class="channel-nav" id="channel-nav">
                <!-- Channel links will be injected here -->
                <div class="nav-loading">読み込み中...</div>
            </nav>
            <div class="sidebar-footer">
                <button id="add-channel-btn" class="btn btn-secondary">
                    <i data-lucide="plus-circle"></i>
                    <span>追加</span>
                </button>
                <button id="reset-settings-btn" class="btn btn-ghost btn-sm" style="font-size: 0.7rem; color: var(--text-secondary);">
                    IDをリセット
                </button>
                <div class="user-profile">
                    <div id="auth-status" class="auth-status">未接続</div>
                    <button id="auth-btn" class="btn btn-primary btn-sm">ログイン</button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <h1 id="current-channel-name">ダッシュボード</h1>
                <div class="header-actions">
                    <button id="refresh-btn" class="icon-btn" title="更新">
                        <i data-lucide="refresh-cw"></i>
                    </button>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Subscriber Stats -->
                <section class="card stats-card accent-card">
                    <div class="card-header">
                        <h2>登録者数</h2>
                        <i data-lucide="users"></i>
                    </div>
                    <div class="stats-value" id="subscriber-count">---</div>
                    <div class="stats-trend positive">+--- (今月)</div>
                </section>

                <!-- Video Performance List -->
                <section class="card video-performance-card">
                    <div class="card-header">
                        <h2>最新5動画のパフォーマンス</h2>
                        <i data-lucide="trending-up"></i>
                    </div>
                    <div class="table-container">
                        <table id="video-performance-table">
                            <thead>
                                <tr>
                                    <th>タイトル</th>
                                    <th>投稿日時</th>
                                    <th>再生数</th>
                                    <th>高評価</th>
                                    <th>コメント</th>
                                    <th>エンゲージ率</th>
                                    <th>維持率(遅延)</th>
                                </tr>
                            </thead>
                            <tbody id="video-performance-body">
                                <!-- Video rows will be injected here -->
                                <tr><td colspan="4" class="empty-msg">データを取得中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Scheduled Uploads -->
                <section class="card uploads-card">
                    <div class="card-header">
                        <h2>予約投稿管理</h2>
                        <i data-lucide="calendar"></i>
                    </div>
                    <div class="upload-list" id="scheduled-uploads-list">
                        <!-- Upload items will be injected here -->
                        <p class="empty-msg">予約中の動画はありません</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Mobile Nav Overlay -->
    <div id="mobile-nav-overlay" class="mobile-nav-overlay">
        <div class="mobile-nav-content" id="mobile-nav-list">
            <!-- Channel list for mobile will be injected here -->
        </div>
    </div>

    <!-- Modals -->
    <div id="upload-edit-modal" class="modal">
        <div class="modal-content glass">
            <h3>予約時間の変更</h3>
            <div class="form-group">
                <label for="publish-date">公開日時</label>
                <input type="datetime-local" id="publish-date">
            </div>
            <div class="modal-actions">
                <button id="modal-publish-btn" class="btn btn-secondary" style="margin-right: auto; border-color: var(--success); color: var(--success);">今すぐ公開</button>
                <button id="modal-cancel-btn" class="btn btn-ghost">キャンセル</button>
                <button id="modal-save-btn" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js?v=17"></script>
</body>
</html>
